# Nixpacks config for the backend service on Railway.
# Monorepo layout: backend/ holds the Python app, frontend/ is a separate Railway service.
#
# Key lessons:
#   - Nix's python312 is immutable — ensurepip and --break-system-packages are blocked.
#   - Solution: create a venv, then use /opt/venv/bin/pip and /opt/venv/bin/python exclusively.
#   - All start commands must use the venv python so installed packages are on sys.path.
#   - Nix's gcc provides the compiler but does NOT put libstdc++.so.6 on the system
#     library path. pandas/numpy need the C++ runtime at import time. Fix: install
#     libstdc++6 via apt (always available on Railway's Ubuntu base image).

[phases.setup]
nixPkgs = ["python312", "gcc", "nodejs_20"]
aptPkgs = ["libstdc++6"]

[phases.install]
cmds = [
  "python3.12 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "cd backend && /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
