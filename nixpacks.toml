# Nixpacks config for the backend service on Railway.
# Monorepo layout: backend/ holds the Python app, frontend/ is a separate Railway service.
#
# Key lessons:
#   - python312 nix pkg puts python3/python3.12 on PATH but NOT a bare "pip" binary.
#   - Always invoke pip via  python3.12 -m pip  to guarantee it resolves correctly.
#   - ensurepip bootstraps pip into the nix-installed interpreter before the install phase.

[phases.setup]
nixPkgs = ["python312", "gcc"]
cmds   = ["python3.12 -m ensurepip --upgrade", "python3.12 -m pip install --upgrade pip"]

[phases.install]
cmds = ["python3.12 -m pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && python3.12 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
