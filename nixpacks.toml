# Nixpacks config for the backend service on Railway.
# Monorepo layout: backend/ holds the Python app, frontend/ is a separate Railway service.
#
# Key lessons:
#   - Nix's python312 is immutable — ensurepip and --break-system-packages are blocked.
#   - Solution: create a venv, then use /opt/venv/bin/pip and /opt/venv/bin/python exclusively.
#   - All start commands must use the venv python so installed packages are on sys.path.
#   - pandas/numpy C++ extensions need libstdc++.so.6 at runtime. aptPkgs = ["libstdc++6"]
#     does NOT work because apt packages are not on the nix venv's linker search path.
#   - Fix: gcc-unwrapped in nixPkgs puts libstdc++ in the nix store. The start command
#     then dynamically locates it and sets LD_LIBRARY_PATH before uvicorn starts, so
#     the linker finds it regardless of the nix store hash (which changes per build).

[phases.setup]
nixPkgs = ["python312", "gcc", "gcc-unwrapped", "nodejs_20"]

[phases.install]
cmds = [
  "python3.12 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "export LD_LIBRARY_PATH=$(dirname $(find /nix/store -name 'libstdc++.so.6' 2>/dev/null | head -1)):$LD_LIBRARY_PATH && cd backend && /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
