# Nixpacks config for the backend service on Railway.
# The frontend deploys as a separate Railway service using frontend/package.json.
[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
